<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <title>几何表情 - 主页 (WS)</title>
    <link rel="stylesheet" href="../static/CSS/expression_main.css">
</head>

<body>

    <button class="unlock-btn" id="unlockBtn">🔊 全屏+开启声音</button>

    <div class="face-container" id="faceContainer">
        <div class="face" id="face">
            <div class="eye left">
                <div class="pupil">
                    <div class="hidden_1"></div>
                    <div class="hidden_2"></div>
                </div>
            </div>
            <div class="eye right">
                <div class="pupil">
                    <div class="hidden_1"></div>
                    <div class="hidden_2"></div>
                </div>
            </div>
        </div>
    </div>

    <audio id="audioPlayer" playsinline>
        <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

        <script src="../static/JS/expression_main.js"></script>
</body>

</html>
